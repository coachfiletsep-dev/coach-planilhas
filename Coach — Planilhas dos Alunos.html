<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8f060;
    --accent2: #a8d040;
    --danger: #ff5c5c;
    --success: #4ade80;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 0; display: flex; flex-direction: column; }
  .sidebar-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-header .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .sidebar-header .sub { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: var(--mono); }
  .sidebar-status { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 12px; color: var(--text2); font-family: var(--mono); }

  .sidebar-section { padding: 16px 20px 8px; }
  .sidebar-section-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .sheet-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 11px; font-family: var(--mono); color: var(--text); margin-bottom: 8px; }
  .sheet-input:focus { outline: none; border-color: var(--accent); }
  .btn { padding: 8px 14px; font-size: 12px; font-family: var(--sans); font-weight: 600; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.15s; width: 100%; text-align: left; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent2); }
  .btn.small { padding: 6px 10px; font-size: 11px; width: auto; }

  .tabs-list { padding: 8px 12px; flex: 1; overflow-y: auto; }
  .tab-btn { width: 100%; text-align: left; padding: 8px 10px; font-size: 12px; font-family: var(--mono); color: var(--text2); background: none; border: none; border-radius: 5px; cursor: pointer; transition: all 0.1s; margin-bottom: 2px; }
  .tab-btn:hover { background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #0f0f0f; font-weight: 500; }

  /* Main */
  .main { display: flex; flex-direction: column; }
  .topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .topbar-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .topbar-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .topbar-actions { display: flex; gap: 8px; }

  .content { flex: 1; padding: 24px 28px; overflow-y: auto; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); }
  thead tr { background: var(--surface2); }
  th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
  td:first-child { color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  td.editable { cursor: pointer; }
  td.editable:hover { color: var(--accent); }
  td input.cell-input { background: var(--surface); border: 1px solid var(--accent); border-radius: 4px; padding: 3px 6px; color: var(--accent); font-family: var(--mono); font-size: 12px; width: 100%; min-width: 80px; }

  /* Edit panel */
  .edit-panel { background: var(--surface); border-top: 1px solid var(--border); padding: 20px 28px; }
  .edit-panel-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
  .edit-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
  .edit-label { font-size: 11px; color: var(--text3); font-family: var(--mono); min-width: 80px; padding-top: 9px; }
  .edit-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 10px; font-size: 12px; font-family: var(--mono); color: var(--text); }
  .edit-input:focus { outline: none; border-color: var(--accent); }
  textarea.edit-input { resize: vertical; min-height: 80px; }
  .edit-actions { display: flex; gap: 8px; }
  .btn-save { background: var(--accent); color: #0f0f0f; border: none; border-radius: 6px; padding: 9px 20px; font-family: var(--sans); font-weight: 700; font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: var(--accent2); }
  .btn-cancel { background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 9px 16px; font-family: var(--sans); font-size: 13px; color: var(--text2); cursor: pointer; }
  .btn-cancel:hover { color: var(--text); }

  /* Empty / loading states */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 12px; }
  .empty-icon { font-size: 40px; opacity: 0.2; }
  .empty-text { font-size: 13px; color: var(--text3); }
  .loading-bar { width: 200px; height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: load 1.2s ease-in-out infinite; }
  @keyframes load { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 18px; font-size: 13px; font-family: var(--mono); color: var(--text); display: none; z-index: 999; }
  .toast.ok { border-color: var(--success); color: var(--success); }
  .toast.err { border-color: var(--danger); color: var(--danger); }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-family: var(--mono); font-weight: 500; }
  .badge-green { background: rgba(74,222,128,0.1); color: var(--success); }
  .badge-yellow { background: rgba(200,240,96,0.1); color: var(--accent); }
</style>

<script>

};

let accessToken = null;
let tokenExpiry = 0;
let currentSheetId = '';
let currentTab = '';
let currentData = [];

async function getToken() {
  if (accessToken && Date.now() < tokenExpiry - 30000) return accessToken;
  setStatus('loading', 'obtendo token...');
  const now = Math.floor(Date.now() / 1000);
  const header = { alg: 'RS256', typ: 'JWT' };
  const payload = {
    iss: CREDS.client_email,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: CREDS.token_uri,
    exp: now + 3600,
    iat: now
  };
  const sHeader = JSON.stringify(header);
  const sPayload = JSON.stringify(payload);
  const jwt = KJUR.jws.JWS.sign('RS256', sHeader, sPayload, CREDS.private_key);
  const r = await fetch(CREDS.token_uri, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const d = await r.json();
  if (d.access_token) {
    accessToken = d.access_token;
    tokenExpiry = Date.now() + (d.expires_in * 1000);
    setStatus('ok', CREDS.client_email.split('@')[0]);
    return accessToken;
  }
  setStatus('', 'erro ao autenticar');
  throw new Error('Auth failed: ' + JSON.stringify(d));
}

function setStatus(type, text) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  dot.className = 'dot' + (type ? ' ' + type : '');
  txt.textContent = text;
}

async function conectarECarregar() {
  currentSheetId = document.getElementById('sheet-id-input').value.trim();
  if (!currentSheetId) return;
  try {
    const token = await getToken();
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}?fields=sheets.properties.title,properties.title`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    if (!d.sheets) { toast('Erro ao carregar planilha. Verifique o ID e o compartilhamento.', 'err'); return; }
    document.getElementById('topbar-title').textContent = d.properties?.title || 'Planilha';
    renderTabs(d.sheets.map(s => s.properties.title));
    toast('Planilha carregada com sucesso!', 'ok');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }
}

function renderTabs(tabs) {
  const list = document.getElementById('tabs-list');
  list.innerHTML = '';
  tabs.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = name;
    btn.onclick = () => carregarAba(name, btn);
    list.appendChild(btn);
  });
}

async function carregarAba(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = name;
  document.getElementById('topbar-title').textContent = name;
  document.getElementById('topbar-meta').textContent = 'carregando...';
  mostrarLoading();
  try {
    const token = await getToken();
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${encodeURIComponent(name)}`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    currentData = d.values || [];
    document.getElementById('topbar-meta').textContent = `${currentData.length} linhas · ${currentData[0]?.length || 0} colunas`;
    document.getElementById('topbar-actions').innerHTML = `
      <button class="btn small" onclick="abrirEditPanel()">✏️ Editar</button>
      <button class="btn small" onclick="copiarDados()">📋 Copiar tudo</button>
    `;
    renderTabela(currentData);
  } catch(e) {
    toast('Erro ao carregar aba: ' + e.message, 'err');
  }
}

function mostrarLoading() {
  document.getElementById('main-content').innerHTML = `
    <div class="empty">
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <div class="empty-text">carregando dados...</div>
    </div>`;
}

function renderTabela(data) {
  if (!data || data.length === 0) {
    document.getElementById('main-content').innerHTML = '<div class="empty"><div class="empty-text">aba vazia</div></div>';
    return;
  }
  const maxCols = Math.max(...data.map(r => r.length));
  let html = '<div class="table-wrap"><table><thead><tr><th>#</th>';
  for (let c = 0; c < Math.min(maxCols, 20); c++) {
    const col = String.fromCharCode(65 + c);
    html += `<th>${col}</th>`;
  }
  html += '</tr></thead><tbody>';
  data.forEach((row, ri) => {
    html += `<tr><td style="color:var(--text3);user-select:none;">${ri + 1}</td>`;
    for (let c = 0; c < Math.min(maxCols, 20); c++) {
      const val = row[c] || '';
      const display = val.length > 40 ? val.substring(0, 40) + '…' : val;
      html += `<td class="editable" title="${val.replace(/"/g,'&quot;')}" onclick="editarCelula(${ri},${c},this)">${display}</td>`;
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('main-content').innerHTML = html;
}

function editarCelula(row, col, td) {
  const colLetter = String.fromCharCode(65 + col);
  const range = `${colLetter}${row + 1}`;
  document.getElementById('ep-tab').value = currentTab;
  document.getElementById('ep-range').value = range;
  document.getElementById('ep-values').value = currentData[row]?.[col] || '';
  document.getElementById('edit-panel').style.display = 'block';
  document.getElementById('ep-values').focus();
}

function abrirEditPanel() {
  document.getElementById('ep-tab').value = currentTab;
  document.getElementById('ep-range').value = '';
  document.getElementById('ep-values').value = '';
  document.getElementById('edit-panel').style.display = 'block';
}

function fecharEditPanel() {
  document.getElementById('edit-panel').style.display = 'none';
}

async function salvarCelulas() {
  const tab = document.getElementById('ep-tab').value.trim();
  const range = document.getElementById('ep-range').value.trim();
  const raw = document.getElementById('ep-values').value;
  if (!tab || !range || !raw) { document.getElementById('ep-status').textContent = 'Preencha aba, range e valores.'; return; }
  const values = raw.split('\n').map(line => line.split(',').map(v => v.trim()));
  document.getElementById('ep-status').textContent = 'Salvando...';
  try {
    const token = await getToken();
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${encodeURIComponent(tab + '!' + range)}?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values })
    });
    const d = await r.json();
    if (d.updatedCells) {
      document.getElementById('ep-status').textContent = `✓ ${d.updatedCells} células salvas`;
      toast(`${d.updatedCells} células atualizadas`, 'ok');
      if (currentTab === tab) carregarAba(currentTab, document.querySelector('.tab-btn.active'));
    } else {
      document.getElementById('ep-status').textContent = 'Erro: ' + (d.error?.message || JSON.stringify(d));
    }
  } catch(e) {
    document.getElementById('ep-status').textContent = 'Erro: ' + e.message;
  }
}

function copiarDados() {
  const text = currentData.map(r => r.join('\t')).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('Dados copiados!', 'ok'));
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
</script>
