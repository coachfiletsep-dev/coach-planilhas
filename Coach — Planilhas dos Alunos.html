<style>
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
    --border:#2e2e2e;--border2:#3a3a3a;
    --text:#f0f0f0;--text2:#888;--text3:#555;
    --accent:#c8f060;--accent2:#a8d040;
    --danger:#ff5c5c;--success:#4ade80;
    --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
  .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh;}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
  .logo{font-size:18px;font-weight:700;color:var(--accent);}
  .sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
  .status-bar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:all .3s;}
  .dot.ok{background:var(--success);box-shadow:0 0 8px var(--success);}
  .dot.loading{background:var(--accent);animation:pulse 1s infinite;}
  .dot.err{background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .status-text{font-size:11px;color:var(--text2);font-family:var(--mono);}
  .sidebar-body{padding:16px 20px;border-bottom:1px solid var(--border);}
  .label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:block;}
  input.field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;font-family:var(--mono);color:var(--text);margin-bottom:8px;outline:none;transition:border .2s;}
  input.field:focus{border-color:var(--accent);}
  .btn{width:100%;padding:9px 14px;font-size:12px;font-family:var(--sans);font-weight:600;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;text-align:left;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);color:#0f0f0f;border-color:var(--accent);text-align:center;}
  .btn.primary:hover{background:var(--accent2);}
  .btn.sm{padding:6px 10px;font-size:11px;width:auto;}
  .tabs-section{padding:12px 20px 8px;}
  .tabs-list{flex:1;overflow-y:auto;padding:4px 12px 12px;}
  .tab-btn{width:100%;text-align:left;padding:7px 10px;font-size:12px;font-family:var(--mono);color:var(--text2);background:none;border:none;border-radius:5px;cursor:pointer;transition:all .1s;margin-bottom:2px;}
  .tab-btn:hover{background:var(--surface2);color:var(--text);}
  .tab-btn.active{background:var(--accent);color:#0f0f0f;font-weight:500;}
  .main{display:flex;flex-direction:column;overflow:hidden;}
  .topbar{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .topbar-left h2{font-size:14px;font-weight:600;}
  .topbar-left p{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  .topbar-right{display:flex;gap:8px;}
  .content{flex:1;overflow-y:auto;padding:20px 24px;}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;}
  .empty-icon{font-size:36px;opacity:.15;}
  .empty-text{font-size:13px;color:var(--text3);}
  .loading-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:80px 0;}
  .loading-bar{width:180px;height:2px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  .loading-fill{height:100%;background:var(--accent);animation:load 1.2s ease-in-out infinite;}
  @keyframes load{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
  .table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono);}
  thead tr{background:var(--surface2);}
  th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  td:first-child{color:var(--text3);width:36px;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .edit-panel{border-top:1px solid var(--border);padding:18px 24px;background:var(--surface);flex-shrink:0;}
  .edit-panel h3{font-size:13px;font-weight:600;margin-bottom:12px;}
  .ep-row{display:flex;gap:10px;margin-bottom:8px;align-items:center;}
  .ep-label{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:70px;}
  .ep-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:12px;font-family:var(--mono);color:var(--text);outline:none;}
  .ep-input:focus{border-color:var(--accent);}
  textarea.ep-input{resize:vertical;min-height:70px;}
  .ep-actions{display:flex;gap:8px;margin-top:4px;}
  .btn-save{background:var(--accent);color:#0f0f0f;border:none;border-radius:6px;padding:8px 20px;font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer;}
  .btn-save:hover{background:var(--accent2);}
  .btn-cancel{background:none;border:1px solid var(--border2);border-radius:6px;padding:8px 14px;color:var(--text2);font-family:var(--sans);font-size:13px;cursor:pointer;}
  .ep-status{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:6px;}
  .toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);display:none;z-index:999;border:1px solid;}
  .toast.ok{background:var(--surface2);border-color:var(--success);color:var(--success);}
  .toast.err{background:var(--surface2);border-color:var(--danger);color:var(--danger);}
  .err-box{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.3);border-radius:8px;padding:12px 16px;margin-top:10px;font-size:11px;font-family:var(--mono);color:var(--danger);line-height:1.6;}
</style>

let accessToken=null,tokenExpiry=0,currentSheetId='',currentTab='',currentData=[];

function b64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function pemToBuffer(pem){
  const b64=pem.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
  const bin=atob(b64);
  return Uint8Array.from(bin,c=>c.charCodeAt(0)).buffer;
}
async function getToken(){
  if(accessToken&&Date.now()<tokenExpiry-30000)return accessToken;
  setStatus('loading','autenticando...');
  const now=Math.floor(Date.now()/1000);
  const enc=new TextEncoder();
  const header=b64url(enc.encode(JSON.stringify({alg:'RS256',typ:'JWT'})));
  const payload=b64url(enc.encode(JSON.stringify({
    iss:CLIENT_EMAIL,scope:'https://www.googleapis.com/auth/spreadsheets',
    aud:TOKEN_URI,exp:now+3600,iat:now
  })));
  const sigInput=`${header}.${payload}`;
  const key=await crypto.subtle.importKey('pkcs8',pemToBuffer(PEM),
    {name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,enc.encode(sigInput));
  const jwt=`${sigInput}.${b64url(sig)}`;
  const r=await fetch(TOKEN_URI,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const d=await r.json();
  if(d.access_token){
    accessToken=d.access_token;
    tokenExpiry=Date.now()+d.expires_in*1000;
    setStatus('ok','conectado');
    return accessToken;
  }
  throw new Error(d.error_description||JSON.stringify(d));
}
function setStatus(t,txt){
  document.getElementById('dot').className='dot'+(t?' '+t:'');
  document.getElementById('status-text').textContent=txt;
}
function showErr(msg){
  document.getElementById('err-box').innerHTML=`<div class="err-box">⚠️ ${msg}</div>`;
}
async function conectar(){
  document.getElementById('err-box').innerHTML='';
  currentSheetId=document.getElementById('sheet-id').value.trim();
  if(!currentSheetId)return;
  try{
    const token=await getToken();
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}?fields=sheets.properties.title,properties.title`,
      {headers:{Authorization:'Bearer '+token}});
    if(!r.ok)throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    const d=await r.json();
    if(!d.sheets)throw new Error('Planilha não encontrada. Verifique se foi compartilhada com: '+CLIENT_EMAIL);
    document.getElementById('topbar-title').textContent=d.properties?.title||'Planilha';
    renderTabs(d.sheets.map(s=>s.properties.title));
    toast('Planilha carregada!','ok');
  }catch(e){setStatus('err','erro');showErr(e.message);}
}
function renderTabs(tabs){
  const list=document.getElementById('tabs-list');
  list.innerHTML='';
  tabs.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='tab-btn';btn.textContent=name;
    btn.onclick=()=>carregarAba(name,btn);
    list.appendChild(btn);
  });
}
async function carregarAba(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTab=name;
  document.getElementById('topbar-title').textContent=name;
  document.getElementById('topbar-meta').textContent='';
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('content').innerHTML=`<div class="loading-wrap"><div class="loading-bar"><div class="loading-fill"></div></div><div style="font-size:12px;color:var(--text3);font-family:var(--mono);">carregando ${name}...</div></div>`;
  try{
    const token=await getToken();
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${encodeURIComponent(name)}`,
      {headers:{Authorization:'Bearer '+token}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    currentData=d.values||[];
    if(!currentData.length){
      document.getElementById('content').innerHTML='<div class="empty"><div class="empty-text">aba vazia ou sem dados</div></div>';
      return;
    }
    const maxCols=Math.max(...currentData.map(r=>r.length));
    document.getElementById('topbar-meta').textContent=`${currentData.length} linhas · ${maxCols} colunas`;
    document.getElementById('topbar-actions').innerHTML=
      `<button class="btn sm" onclick="abrirEdit()">✏️ Editar</button>
       <button class="btn sm" onclick="copiar()">📋 Copiar</button>`;
    renderTabela(currentData,maxCols);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="err-box" style="max-width:400px;">⚠️ Erro: ${e.message}</div></div>`;
  }
}
function renderTabela(data,maxCols){
  const cols=Math.min(maxCols,15);
  let html='<div class="table-wrap"><table><thead><tr><th>#</th>';
  for(let c=0;c<cols;c++)html+=`<th>${String.fromCharCode(65+c)}</th>`;
  html+='</tr></thead><tbody>';
  data.forEach((row,ri)=>{
    html+=`<tr><td>${ri+1}</td>`;
    for(let c=0;c<cols;c++){const v=row[c]||'';html+=`<td title="${v.replace(/"/g,'&quot;')}">${v}</td>`;}
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('content').innerHTML=html;
}
function abrirEdit(){
  document.getElementById('ep-tab').value=currentTab;
  document.getElementById('ep-range').value='';
  document.getElementById('ep-values').value='';
  document.getElementById('ep-status').textContent='';
  document.getElementById('edit-panel').style.display='block';
}
function fecharEdit(){document.getElementById('edit-panel').style.display='none';}
async function salvar(){
  const tab=document.getElementById('ep-tab').value.trim();
  const range=document.getElementById('ep-range').value.trim();
  const raw=document.getElementById('ep-values').value.trim();
  if(!tab||!range||!raw){document.getElementById('ep-status').textContent='Preencha todos os campos.';return;}
  const values=raw.split('\n').map(l=>l.split(',').map(v=>v.trim()));
  document.getElementById('ep-status').textContent='Salvando...';
  try{
    const token=await getToken();
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${encodeURIComponent(tab+'!'+range)}?valueInputOption=USER_ENTERED`,
      {method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
       body:JSON.stringify({values})});
    const d=await r.json();
    if(d.updatedCells){
      document.getElementById('ep-status').textContent=`✓ ${d.updatedCells} células salvas`;
      toast(`${d.updatedCells} células atualizadas`,'ok');
      carregarAba(currentTab,document.querySelector('.tab-btn.active'));
    }else{
      document.getElementById('ep-status').textContent='Erro: '+(d.error?.message||JSON.stringify(d));
    }
  }catch(e){document.getElementById('ep-status').textContent='Erro: '+e.message;}
}
function copiar(){
  navigator.clipboard.writeText(currentData.map(r=>r.join('\t')).join('\n'));
  toast('Dados copiados!','ok');
}
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}
</script>
